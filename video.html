<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS - Video</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f6f4ef;
      color: #131313;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: min(980px, 92vw);
    }
    h1 {
      font-size: 1.35rem;
      margin: 0 0 0.75rem;
    }
    .back {
      display: inline-block;
      margin-top: 0.75rem;
      color: #131313;
    }
    video {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d8d5cd;
      background: #000;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Intro Video</h1>
    <video controls preload="metadata">
      <source src="./assets/sweaty-startup-vid.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <a class="back" href="./index.html">Back to main page</a>
  </main>
</body>
</html>
